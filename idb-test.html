<p id="result"></p>
<input type="text" id="input" placeholder="Type something...">
<button onclick="saveData()">Save to IndexedDB</button>

<script>
  let db;
  const request = indexedDB.open("MyDatabase", 1);

  // Initialize Database
  request.onupgradeneeded = (e) => {
    db = e.target.result;
    db.createObjectStore("settings", { keyPath: "id" });
  };

  request.onsuccess = (e) => {
    db = e.target.result;
    loadData(); // Load value on page start
  };

  // Load from DB
  function loadData() {
    const transaction = db.transaction(["settings"], "readonly");
    const store = transaction.objectStore("settings");
    const getReq = store.get("userText");

    getReq.onsuccess = () => {
      if (getReq.result) {
        document.getElementById('result').innerText = getReq.result.val;
      }
    };
  }

  // Save to DB
  function saveData() {
    const val = document.getElementById('input').value;
    const transaction = db.transaction(["settings"], "readwrite");
    const store = transaction.objectStore("settings");
    
    store.put({ id: "userText", val: val });
    
    transaction.oncomplete = () => {
      document.getElementById('result').innerText = val;
      alert("Saved!");
    };
  }
</script>
