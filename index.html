<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SquatPet Pro</title>
    <style>
        :root { --bg: #f2f2f7; --card: #fff; --accent: #5856d6; --gold: #ffcc00; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #app { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
        .screen { background: var(--card); border-radius: 35px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; text-align: center; }
        .pet-container { position: relative; width: 200px; height: 200px; margin: 20px auto; background: #eee; border-radius: 50%; }
        .pet-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; pointer-events: none; }
        
        /* Buttons & HUD */
        .stat-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; font-size: 14px; }
        .coin-btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .hidden { display: none !important; }
        button { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .primary-btn { background: var(--accent); color: white; width: 100%; }
        
        #exercise-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;}
    </style>
</head>
<body>
<div id="app">
    <!-- 1. CUSTOMIZATION SCREEN -->
    <div id="setup-screen" class="screen">
        <h2>Adopt Your Pet</h2>
        <div class="pet-container">
            <div id="preview-body" class="pet-layer" style="background-color: var(--accent); border-radius: 50%;"></div>
            <div id="preview-eyes" class="pet-layer"></div>
            <div id="preview-mouth" class="pet-layer"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px;">
            <button onclick="changePart('body', 1)">Body</button>
            <button onclick="changePart('eyes', 1)">Eyes</button>
            <button onclick="changePart('mouth', 1)">Mouth</button>
        </div>
        <input type="text" id="pet-name-input" placeholder="Pet Name" style="padding:15px; width:80%; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
        <button class="primary-btn" onclick="startApp()">Adopt Now</button>
    </div>

    <!-- 2. MAIN GAME -->
    <div id="game-screen" class="screen hidden">
        <div id="hud-top" style="background: #f8f8ff; border-radius: 20px; padding: 10px; margin-bottom: 15px;">
            <div class="stat-bar">
                <span>🥩 <span id="full-val">50</span>%</span>
                <span>🧼 <span id="clean-val">50</span>%</span>
                <span>🎂 <span id="age-val">0</span>d</span>
            </div>
            <div style="font-weight: 800;">Coins: 💰 <span id="coin-val">0</span></div>
        </div>
        <div class="pet-container" id="main-pet-view" style="pointer-events: auto;">
            <div id="view-body" class="pet-layer" style="background-color: var(--accent); border-radius: 50%;"></div>
            <div id="view-eyes" class="pet-layer"></div>
            <div id="view-mouth" class="pet-layer"></div>
        </div>
        <button class="primary-btn" onclick="feedPet()">Feed Pet (1 Coin)</button>
        <button class="coin-btn" onclick="openExercise()">🏋️ Collect Coins</button>
        <button onclick="deleteProgress()" style="color:red; background:none; margin-top:15px; font-size:12px;">Delete Progress</button>
    </div>

    <!-- 3. EXERCISE -->
    <div id="exercise-screen" class="screen hidden">
        <button onclick="requestMotionPermission()" style="background:green; color:white; width:100%; font-size:18px; margin-bottom:20px;">1. Tap to Enable Sensors</button>
        <p>Hold phone out. Perform 10 deep squats!</p>
        <div style="font-family: monospace; margin-top:10px;">
        AX: <span id="dbg-ax">0</span><br>
        AY: <span id="dbg-ay">0</span><br>
        AZ: <span id="dbg-az">0</span><br>
        MAG: <span id="dbg-mag">0</span><br>
        SMOOTH: <span id="dbg-smooth">0</span><br>
        PHASE: <span id="dbg-phase">standing</span><br>
        SQUATS: <span id="dbg-count">0</span>
        </div>
        <h1><span id="squat-count">0</span>/10</h1>
        <button onclick="closeExercise()" style="background:black; color:white; width:100%;">Return to Pet</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
